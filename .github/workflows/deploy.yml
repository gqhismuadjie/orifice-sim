name: Deploy to GitHub Pages

# Publishes the static site (repository root) to GitHub Pages.
# No build step is required — the app is plain HTML/JS with React vendored locally.

on:
  push:
    branches:
      - main
      - claude/github-pages-educational-ui-od9nn3
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs for the same ref.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Enable GitHub Pages automatically on first run (build type = GitHub Actions),
          # so no manual Settings → Pages step is required for a user-owned public repo.
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the whole repository root as the site.
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
